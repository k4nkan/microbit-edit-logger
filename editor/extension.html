<!doctype html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MakeCode Edit Logger</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f5f7fb;
            --panel: #ffffff;
            --text: #1f2937;
            --muted: #667085;
            --line: #d8dee9;
            --primary: #4051b5;
            --primary-dark: #2f3f99;
            --danger: #b42318;
            --ok: #027a48;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            font-size: 14px;
        }

        main {
            max-width: 960px;
            margin: 0 auto;
            padding: 16px;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 12px;
        }

        h1 {
            margin: 0;
            font-size: 20px;
            line-height: 1.2;
        }

        .status {
            color: var(--muted);
            font-size: 13px;
        }

        .toolbar,
        .summary,
        .log,
        .export-panel {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 8px;
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
            padding: 12px;
            margin-bottom: 12px;
        }

        button {
            border: 1px solid var(--line);
            border-radius: 6px;
            background: #fff;
            color: var(--text);
            cursor: pointer;
            font: inherit;
            min-height: 34px;
            padding: 6px 10px;
        }

        button.primary {
            background: var(--primary);
            border-color: var(--primary);
            color: #fff;
        }

        button.primary:hover {
            background: var(--primary-dark);
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.55;
        }

        button.danger {
            color: var(--danger);
        }

        label {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--muted);
        }

        input[type="number"] {
            width: 72px;
            min-height: 34px;
            border: 1px solid var(--line);
            border-radius: 6px;
            padding: 6px 8px;
            font: inherit;
        }

        .summary {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 1px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .metric {
            background: #fff;
            padding: 12px;
        }

        .metric span {
            display: block;
            color: var(--muted);
            font-size: 12px;
            margin-bottom: 4px;
        }

        .metric strong {
            font-size: 20px;
        }

        .log {
            overflow: hidden;
        }

        .export-panel {
            margin-top: 12px;
            padding: 12px;
        }

        .export-panel[hidden] {
            display: none;
        }

        .export-panel-header,
        .export-actions {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        .export-panel p {
            color: var(--muted);
            margin: 8px 0;
        }

        textarea {
            width: 100%;
            min-height: 180px;
            resize: vertical;
            border: 1px solid var(--line);
            border-radius: 6px;
            color: var(--text);
            font: 12px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
            padding: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            border-bottom: 1px solid var(--line);
            padding: 9px 10px;
            text-align: left;
            vertical-align: top;
        }

        th {
            background: #eef2ff;
            color: #30374f;
            font-size: 12px;
            font-weight: 700;
        }

        td {
            font-size: 13px;
        }

        .empty {
            padding: 24px;
            color: var(--muted);
            text-align: center;
        }

        .ok {
            color: var(--ok);
        }

        .error {
            color: var(--danger);
        }

        @media (max-width: 720px) {
            .summary {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }
    </style>
</head>
<body>
    <main>
        <header>
            <div>
                <h1>Edit Logger</h1>
                <div id="status" class="status">initializing</div>
            </div>
        </header>

        <section class="toolbar" aria-label="controls">
            <button id="start" class="primary" type="button">Start</button>
            <button id="stop" type="button" disabled>Stop</button>
            <button id="exportJson" type="button">Export JSON</button>
            <button id="exportCsv" type="button">Export CSV</button>
            <button id="clear" class="danger" type="button">Clear</button>
        </section>

        <section class="summary" aria-label="summary">
            <div class="metric"><span>Events</span><strong id="count">0</strong></div>
            <div class="metric"><span>Block Types</span><strong id="types">0</strong></div>
            <div class="metric"><span>Blocks</span><strong id="blocks">0</strong></div>
            <div class="metric"><span>Last Change</span><strong id="lastChange">-</strong></div>
        </section>

        <section class="log" aria-label="edit events">
            <table>
                <thead>
                    <tr>
                        <th>Time</th>
                        <th>Event</th>
                        <th>Files</th>
                        <th>Blocks</th>
                        <th>Change</th>
                    </tr>
                </thead>
                <tbody id="rows"></tbody>
            </table>
            <div id="empty" class="empty">No events yet.</div>
        </section>

        <section id="exportPanel" class="export-panel" aria-label="export" hidden>
            <div class="export-panel-header">
                <strong id="exportTitle">Export</strong>
                <button id="closeExport" type="button">Close</button>
            </div>
            <p>Download may be blocked by the MakeCode iframe sandbox. Copy the content below if the file does not download.</p>
            <textarea id="exportOutput" readonly spellcheck="false"></textarea>
            <div class="export-actions">
                <span id="exportInfo" class="status">export ready</span>
                <button id="copyExport" type="button">Copy</button>
            </div>
        </section>
    </main>

    <script>
        const STORAGE_KEY = "makecode-edit-logger:events"
        const WATCH_INTERVAL_MS = 2000
        const extId = window.location.hash.slice(1)
        const pending = new Map()

        let requestSeq = 0
        let events = loadEvents()
        let sessionId = ""
        let watchTimer = 0
        let readInFlight = false
        let logging = false
        let pendingStop = false
        let lastContentHash = latestCodeEvent() ? latestCodeEvent().contentHash : ""

        const statusEl = document.getElementById("status")
        const rowsEl = document.getElementById("rows")
        const emptyEl = document.getElementById("empty")
        const countEl = document.getElementById("count")
        const typesEl = document.getElementById("types")
        const blocksEl = document.getElementById("blocks")
        const lastChangeEl = document.getElementById("lastChange")
        const startEl = document.getElementById("start")
        const stopEl = document.getElementById("stop")
        const exportPanelEl = document.getElementById("exportPanel")
        const exportTitleEl = document.getElementById("exportTitle")
        const exportOutputEl = document.getElementById("exportOutput")
        const exportInfoEl = document.getElementById("exportInfo")

        function send(action, body, meta) {
            if (window.parent === window) {
                setStatus("open this page from the MakeCode Edit Logger button", "error")
                return false
            }

            const id = `edit-logger-${++requestSeq}`
            pending.set(id, { action, meta: meta || {} })
            window.parent.postMessage({
                type: "pxtpkgext",
                extId,
                id,
                action,
                response: true,
                body
            }, "*")
            return true
        }

        function setStatus(text, kind) {
            statusEl.textContent = text
            statusEl.className = `status ${kind || ""}`.trim()
        }

        function loadEvents() {
            try {
                return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]")
            } catch {
                return []
            }
        }

        function saveEvents() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(events))
        }

        function requestUserCode(reason) {
            if (readInFlight) return false
            readInFlight = true
            setStatus("reading user code")
            if (!send("extusercode", undefined, { reason })) {
                readInFlight = false
                return false
            }
            return true
        }

        function createCodeState(files) {
            const mainTs = files["main.ts"] || ""
            const mainBlocks = files["main.blocks"] || ""
            const blockTypes = countBlockTypes(mainBlocks)

            return {
                files: Object.keys(files).sort(),
                contentHash: hashFiles(files),
                mainTsLength: mainTs.length,
                mainBlocksLength: mainBlocks.length,
                blockTypes,
                totalBlocks: Object.values(blockTypes).reduce((sum, count) => sum + count, 0)
            }
        }

        function countBlockTypes(blocksXml) {
            const counts = {}
            if (!blocksXml) return counts

            const doc = new DOMParser().parseFromString(blocksXml, "application/xml")
            for (const block of doc.querySelectorAll("block[type], shadow[type]")) {
                const type = block.getAttribute("type")
                counts[type] = (counts[type] || 0) + 1
            }
            return counts
        }

        function diffBlockTypes(previous, current) {
            const keys = new Set([...Object.keys(previous), ...Object.keys(current)])
            const added = []
            const removed = []
            const changed = []

            for (const key of keys) {
                const before = previous[key] || 0
                const after = current[key] || 0
                if (!before && after) added.push(`${key} +${after}`)
                else if (before && !after) removed.push(`${key} -${before}`)
                else if (before !== after) changed.push(`${key} ${after - before > 0 ? "+" : ""}${after - before}`)
            }

            return { added, removed, changed }
        }

        function createCodeEvent(type, files) {
            const state = createCodeState(files)
            const previous = latestCodeEventForSession()
            const diff = diffBlockTypes(previous ? previous.blockTypes : {}, state.blockTypes)

            return {
                type,
                sessionId,
                at: new Date().toISOString(),
                ...state,
                diff
            }
        }

        function createSessionEvent(type) {
            return {
                type,
                sessionId,
                at: new Date().toISOString()
            }
        }

        function appendEvent(event) {
            events.push(event)
            saveEvents()
            render()
        }

        function latestCodeEvent() {
            for (let i = events.length - 1; i >= 0; i--) {
                if (events[i].contentHash) return events[i]
            }
            return undefined
        }

        function latestCodeEventForSession() {
            for (let i = events.length - 1; i >= 0; i--) {
                if (events[i].sessionId === sessionId && events[i].contentHash) return events[i]
            }
            return undefined
        }

        function hashFiles(files) {
            const content = JSON.stringify(Object.keys(files).sort().map(key => [key, files[key]]))
            let hash = 5381
            for (let i = 0; i < content.length; i++) {
                hash = ((hash << 5) + hash) ^ content.charCodeAt(i)
            }
            return (hash >>> 0).toString(16)
        }

        function summarizeDiff(diff) {
            const parts = []
            if (diff.added.length) parts.push(`added: ${diff.added.join(", ")}`)
            if (diff.removed.length) parts.push(`removed: ${diff.removed.join(", ")}`)
            if (diff.changed.length) parts.push(`changed: ${diff.changed.join(", ")}`)
            return parts.join(" / ") || "no block type change"
        }

        function render() {
            const latest = latestCodeEvent()
            countEl.textContent = String(events.length)
            typesEl.textContent = latest ? String(Object.keys(latest.blockTypes).length) : "0"
            blocksEl.textContent = latest ? String(latest.totalBlocks) : "0"
            lastChangeEl.textContent = latest ? summarizeShortDiff(latest.diff) : "-"

            rowsEl.innerHTML = ""
            emptyEl.hidden = events.length > 0

            for (const event of events.slice(-50).reverse()) {
                const row = document.createElement("tr")
                row.innerHTML = `
                    <td>${escapeHtml(formatTime(event.at))}</td>
                    <td>${escapeHtml(event.type)}</td>
                    <td>${escapeHtml(event.files ? event.files.join(", ") : "-")}</td>
                    <td>${event.totalBlocks ?? "-"}</td>
                    <td>${escapeHtml(summarizeEvent(event))}</td>
                `
                rowsEl.appendChild(row)
            }
        }

        function summarizeShortDiff(diff) {
            if (!diff) return "-"
            const count = diff.added.length + diff.removed.length + diff.changed.length
            return count ? String(count) : "0"
        }

        function summarizeEvent(event) {
            if (event.type === "start") return "session started"
            if (event.type === "stop") return "session stopped"
            return summarizeDiff(event.diff)
        }

        function formatTime(value) {
            return new Date(value).toLocaleTimeString("ja-JP", {
                hour: "2-digit",
                minute: "2-digit",
                second: "2-digit"
            })
        }

        function escapeHtml(value) {
            return String(value)
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;")
        }

        function showExport(filename, content) {
            exportTitleEl.textContent = filename
            exportOutputEl.value = content
            exportPanelEl.hidden = false
            exportOutputEl.focus()
            exportOutputEl.select()
            setStatus("export ready; copy text below", "ok")
            exportInfoEl.textContent = "copy export text"
        }

        function exportJson() {
            showExport("makecode-edit-log.json", JSON.stringify(events, null, 2))
        }

        function exportCsv() {
            const header = ["at", "sessionId", "type", "files", "totalBlocks", "contentHash", "diff"]
            const lines = [header.join(",")]
            for (const event of events) {
                lines.push([
                    event.at,
                    event.sessionId,
                    event.type,
                    event.files ? event.files.join("|") : "",
                    event.totalBlocks ?? "",
                    event.contentHash || "",
                    summarizeEvent(event)
                ].map(csvCell).join(","))
            }
            showExport("makecode-edit-log.csv", lines.join("\n"))
        }

        function csvCell(value) {
            return `"${String(value).replaceAll('"', '""')}"`
        }

        function startLogging() {
            if (logging) return

            sessionId = `session-${Date.now().toString(36)}`
            logging = true
            pendingStop = false
            startEl.disabled = true
            stopEl.disabled = false
            lastContentHash = ""
            if (!requestUserCode("start")) {
                logging = false
                sessionId = ""
                startEl.disabled = false
                stopEl.disabled = true
                return
            }
            watchTimer = window.setInterval(() => requestUserCode("watch"), WATCH_INTERVAL_MS)
            setStatus("logging started", "ok")
        }

        function stopLogging(captureFinalRead = true) {
            if (!logging && !pendingStop) return

            logging = false
            pendingStop = true
            startEl.disabled = false
            stopEl.disabled = true
            if (watchTimer) {
                clearInterval(watchTimer)
                watchTimer = 0
            }

            if (!captureFinalRead) {
                finishStop()
                return
            }

            if (readInFlight) {
                setStatus("stopping after current read")
                return
            }

            if (!requestUserCode("stop")) {
                finishStop()
            }
        }

        function resetLoggingState() {
            logging = false
            pendingStop = false
            sessionId = ""
            startEl.disabled = false
            stopEl.disabled = true
            if (watchTimer) {
                clearInterval(watchTimer)
                watchTimer = 0
            }
        }

        function finishStop() {
            if (!pendingStop || !sessionId) return

            appendEvent(createSessionEvent("stop"))
            pendingStop = false
            setStatus("logging stopped", "ok")
        }

        function handleUserCode(files, reason) {
            if (!logging && reason !== "stop" && !pendingStop) return

            const eventType = reason === "start" ? "start" : "change"
            const event = createCodeEvent(eventType, files)

            if (reason === "start" || event.contentHash !== lastContentHash) {
                lastContentHash = event.contentHash
                appendEvent(event)
                setStatus(`${event.type} saved at ${formatTime(event.at)}`, "ok")
            } else if (logging) {
                setStatus("logging; no changes")
            }

            if (reason === "stop" || pendingStop) finishStop()
        }

        window.addEventListener("message", ev => {
            const msg = ev.data || {}
            if (msg.type !== "pxtpkgext") return

            if (msg.id && pending.has(msg.id)) {
                const { action, meta } = pending.get(msg.id)
                pending.delete(msg.id)

                if (action === "extusercode") readInFlight = false

                if (!msg.success) {
                    setStatus(`${action} failed: ${msg.error || "unknown error"}`, "error")
                    if (action === "extusercode" && (meta.reason === "stop" || pendingStop)) finishStop()
                    if (action === "extusercode" && meta.reason === "start") resetLoggingState()
                    return
                }

                if (action === "extusercode") {
                    handleUserCode(msg.resp || {}, meta.reason)
                } else if (action === "extinit") {
                    setStatus("ready", "ok")
                }
            }
        })

        startEl.addEventListener("click", startLogging)
        stopEl.addEventListener("click", stopLogging)
        document.getElementById("exportJson").addEventListener("click", exportJson)
        document.getElementById("exportCsv").addEventListener("click", exportCsv)
        document.getElementById("closeExport").addEventListener("click", () => {
            exportPanelEl.hidden = true
        })
        document.getElementById("copyExport").addEventListener("click", async () => {
            exportOutputEl.focus()
            exportOutputEl.select()

            try {
                await navigator.clipboard.writeText(exportOutputEl.value)
                setStatus("export copied", "ok")
                exportInfoEl.textContent = "copied"
            } catch {
                document.execCommand("copy")
                setStatus("export selected; press Cmd+C if copy did not run", "ok")
                exportInfoEl.textContent = "selected"
            }
        })
        document.getElementById("clear").addEventListener("click", () => {
            events = []
            saveEvents()
            render()
            setStatus("logs cleared")
        })

        window.addEventListener("pagehide", () => stopLogging(false))

        window.addEventListener("load", () => {
            render()
            if (window.parent === window) {
                setStatus("UI preview only. Open from MakeCode to capture edit events.", "error")
            } else {
                send("extinit", "")
            }
        })
    </script>
</body>
</html>
